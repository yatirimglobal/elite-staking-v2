<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Elite Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap');
        body { background: #0b0f1a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <h1 class="text-3xl font-black text-yellow-500 font-orbitron italic uppercase">Yönetim Merkezi</h1>
            <div class="flex gap-3">
                <input type="password" id="adminPass" placeholder="Şifre" class="bg-gray-800 border border-gray-700 px-4 py-2 rounded-xl outline-none focus:border-yellow-500">
                <button onclick="loadData()" class="bg-yellow-500 text-black font-bold px-6 py-2 rounded-xl hover:scale-105 transition-all uppercase text-sm">Yenile ↻</button>
            </div>
        </div>

        <!-- Özet Paneli -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass-card p-6 border-l-4 border-blue-500">
                <p class="text-gray-400 text-[10px] font-black uppercase">Aktif Anapara</p>
                <h2 id="sumCap" class="text-2xl font-orbitron mt-2">$0.00</h2>
            </div>
            <div class="glass-card p-6 border-l-4 border-green-500">
                <p class="text-gray-400 text-[10px] font-black uppercase">Ödenecek Toplam Kâr</p>
                <h2 id="sumProf" class="text-2xl font-orbitron mt-2 text-green-400">$0.00</h2>
            </div>
            <div class="glass-card p-6 border-l-4 border-red-500">
                <p class="text-gray-400 text-[10px] font-black uppercase">Bekleyen Çekimler</p>
                <h2 id="sumWith" class="text-2xl font-orbitron mt-2 text-red-400">$0.00</h2>
            </div>
        </div>

        <!-- YATIRIMLAR TABLOSU -->
        <h3 class="text-xl font-bold mb-4 text-yellow-500 flex items-center gap-2">💰 Aktif Yatırımlar & İptal Talepleri</h3>
        <div class="glass-card overflow-hidden mb-12">
            <table class="w-full text-left border-collapse">
                <thead class="bg-white/5 text-[10px] uppercase text-gray-500 font-black">
                    <tr>
                        <th class="p-5">Kullanıcı</th>
                        <th class="p-5">Miktar</th>
                        <th class="p-5">Durum</th>
                        <th class="p-5">İade Adresi (TRC20)</th>
                        <th class="p-5">Vade Sonu</th>
                        <th class="p-5 text-right">İşlem</th>
                    </tr>
                </thead>
                <tbody id="investTable" class="divide-y divide-white/5 text-sm"></tbody>
            </table>
        </div>

        <!-- ÇEKİM TALEPLERİ TABLOSU -->
        <h3 class="text-xl font-bold mb-4 text-red-500 flex items-center gap-2">🏦 Para Çekme Talepleri</h3>
        <div class="glass-card overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-white/5 text-[10px] uppercase text-gray-500 font-black">
                    <tr>
                        <th class="p-5">Kullanıcı</th>
                        <th class="p-5">Miktar</th>
                        <th class="p-5">Cüzdan Adresi (TRC20)</th>
                        <th class="p-5">Tarih</th>
                        <th class="p-5">Durum</th>
                        <th class="p-5 text-right">İşlem</th>
                    </tr>
                </thead>
                <tbody id="withdrawTable" class="divide-y divide-white/5 text-sm"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadData() {
            const password = document.getElementById('adminPass').value;
            if(!password) return alert("Şifre giriniz.");

            try {
                const res = await fetch('/api/admin/all', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ password })
                });
                if(res.status !== 200) return alert("Yetkisiz!");
                const users = await res.json();
                renderAll(users);
            } catch (e) { alert("Hata oluştu."); }
        }

        function renderAll(users) {
            const iTable = document.getElementById('investTable');
            const wTable = document.getElementById('withdrawTable');
            iTable.innerHTML = ''; wTable.innerHTML = '';

            let cap = 0, prof = 0, withD = 0;

            users.forEach(user => {
                // Yatırımları İşle
                user.investments.forEach(inv => {
                    const created = new Date(inv.createdAt);
                    const diff = Math.ceil(inv.planDays - (new Date() - created) / (1000*60*60*24));
                    const remaining = inv.status === 'Aktif' ? (diff > 0 ? diff : 'Doldu') : '-';
                    
                    if(inv.status === 'Aktif') { cap += inv.amount; prof += inv.totalProfit; }

                    // Dinamik Durum Renkleri
                    let statusClass = "bg-yellow-500/20 text-yellow-500";
                    if(inv.status === 'Aktif') statusClass = "bg-green-500/20 text-green-500";
                    if(inv.status === 'İptal Bekliyor') statusClass = "bg-orange-500/20 text-orange-500";

                    iTable.innerHTML += `
                        <tr class="hover:bg-white/5">
                            <td class="p-5 font-bold">${user.telegramId}</td>
                            <td class="p-5 font-black">$${inv.amount.toFixed(2)}</td>
                            <td class="p-5"><span class="px-2 py-1 rounded text-[10px] font-black ${statusClass}">${inv.status}</span></td>
                            <td class="p-5 text-xs font-mono text-gray-400">${inv.returnWallet || '-'}</td>
                            <td class="p-5 text-yellow-500 font-black">${remaining} ${typeof remaining === 'number' ? 'Gün' : ''}</td>
                            <td class="p-5 text-right">
                                ${inv.status === 'Onay Bekliyor' ? 
                                    `<button onclick="approveInvest('${user.telegramId}','${inv._id}')" class="bg-green-600 px-3 py-1 rounded-lg text-xs font-bold">YATIRIMI ONAYLA</button>` : 
                                 inv.status === 'İptal Bekliyor' ?
                                    `<button onclick="deleteInvest('${user.telegramId}','${inv._id}')" class="bg-orange-600 px-3 py-1 rounded-lg text-xs font-bold italic">İADE YAPILDI (SİL)</button>` :
                                    `<button onclick="deleteInvest('${user.telegramId}','${inv._id}')" class="text-red-500 text-xs font-bold">KAYDI SİL</button>`
                                }
                            </td>
                        </tr>`;
                });

                // Çekimleri İşle
                user.withdrawals.forEach(w => {
                    if(w.status === 'Beklemede') withD += w.amount;
                    wTable.innerHTML += `
                        <tr class="hover:bg-white/5">
                            <td class="p-5 font-bold">${user.telegramId}</td>
                            <td class="p-5 font-black text-red-400">$${w.amount.toFixed(2)}</td>
                            <td class="p-5 font-mono text-xs text-gray-400">${w.wallet}</td>
                            <td class="p-5 text-xs">${new Date(w.date).toLocaleDateString()}</td>
                            <td class="p-5"><span class="text-[10px] font-black uppercase ${w.status === 'Beklemede' ? 'text-yellow-500' : 'text-green-500'}">${w.status}</span></td>
                            <td class="p-5 text-right">
                                ${w.status === 'Beklemede' ? `<button onclick="approveWithdraw('${user.telegramId}','${w._id}')" class="bg-red-600 px-3 py-1 rounded-lg text-xs font-bold italic">ÖDENDİ İŞARETLE</button>` : '✅'}
                            </td>
                        </tr>`;
                });
            });

            document.getElementById('sumCap').innerText = '$' + cap.toFixed(2);
            document.getElementById('sumProf').innerText = '$' + prof.toFixed(2);
            document.getElementById('sumWith').innerText = '$' + withD.toFixed(2);
        }

        async function approveInvest(telegramId, investId) {
            const password = document.getElementById('adminPass').value;
            await fetch('/api/admin/approve', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ password, telegramId, investId }) });
            loadData();
        }

        async function approveWithdraw(telegramId, withdrawId) {
            const password = document.getElementById('adminPass').value;
            await fetch('/api/admin/approve-withdraw', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ password, telegramId, withdrawId }) });
            loadData();
        }

        async function deleteInvest(telegramId, investId) {
            if(!confirm("Bu kaydı silmek istediğine emin misin? (İptal isteği ise parayı gönderdiğinden emin ol!)")) return;
            const password = document.getElementById('adminPass').value;
            await fetch('/api/admin/delete-invest', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ password, telegramId, investId }) });
            loadData();
        }
    </script>
</body>
</html>
