<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Staking | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { background: #0f1113; color: #fff; font-family: 'Inter', sans-serif; }
        .admin-card { background: #1a1d21; border: 1px solid #2d3139; border-radius: 12px; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-yellow-500 uppercase tracking-tighter">Yönetim Paneli</h1>
            <button onclick="loadData()" class="bg-yellow-500 text-black px-6 py-2 rounded-lg font-bold text-sm hover:bg-yellow-400">🔄 VERİLERİ YENİLE</button>
        </div>

        <div id="userList" class="space-y-6">
            <p class="text-center text-gray-500">Yükleniyor...</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://elite-staking-v2.onrender.com/api';

        async function loadData() {
            try {
                const res = await fetch(`${API_URL}/admin/all`);
                const users = await res.json();
                renderUsers(users);
            } catch (err) {
                alert("Veri çekme hatası: " + err.message);
            }
        }

        function renderUsers(users) {
            const list = document.getElementById('userList');
            list.innerHTML = '';

            if (users.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-500">Henüz kullanıcı kaydı yok.</p>';
                return;
            }

            users.forEach(user => {
                const card = document.createElement('div');
                card.className = 'admin-card p-6';
                
                // Kullanıcı Başlığı
                let html = `
                    <div class="flex justify-between items-center border-b border-gray-800 pb-4 mb-4">
                        <div>
                            <h2 class="font-bold text-lg text-white">${user.name || 'Bilinmiyor'}</h2>
                            <p class="text-xs text-gray-500 italic">ID: ${user.telegramId}</p>
                        </div>
                        <span class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold">TOPLAM ${user.investments.length} İŞLEM</span>
                    </div>
                `;

                // Yatırımlar Listesi
                if (user.investments.length > 0) {
                    user.investments.forEach(inv => {
                        let statusColor = 'text-yellow-500';
                        if(inv.status === 'Aktif') statusColor = 'text-green-500';
                        if(inv.status === 'Iptal Edildi') statusColor = 'text-red-500';

                        html += `
                            <div class="flex flex-wrap items-center justify-between bg-black/30 p-4 rounded-lg mb-2 gap-4">
                                <div class="flex gap-6">
                                    <div><p class="text-[10px] text-gray-500 uppercase">Miktar</p><p class="text-sm font-bold">$${inv.amount}</p></div>
                                    <div><p class="text-[10px] text-gray-500 uppercase">Vade</p><p class="text-sm font-bold">${inv.planDays} GÜN</p></div>
                                    <div><p class="text-[10px] text-gray-500 uppercase">Durum</p><p class="text-sm font-bold ${statusColor}">${inv.status}</p></div>
                                </div>
                                <div class="flex gap-2">
                                    ${inv.status === 'Onay Bekliyor' ? 
                                        `<button onclick="approveInvest('${user.telegramId}', '${inv._id}')" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded text-[10px] font-bold uppercase">Onayla</button>` : ''
                                    }
                                    <button onclick="deleteInvest('${user.telegramId}', '${inv._id}')" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white px-4 py-2 rounded text-[10px] font-bold uppercase">Sil</button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    html += '<p class="text-xs text-gray-600 italic">Bu kullanıcının henüz yatırımı yok.</p>';
                }

                card.innerHTML = html;
                list.appendChild(card);
            });
        }

        async function approveInvest(tId, iId) {
            if(!confirm("Bu yatırımı onaylıyor musunuz? (Geri sayım başlayacak)")) return;
            const res = await fetch(`${API_URL}/admin/approve`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegramId: tId, investId: iId })
            });
            if(res.ok) loadData();
        }

        async function deleteInvest(tId, iId) {
            if(!confirm("Yatırımı silmek istediğinize emin misiniz?")) return;
            const res = await fetch(`${API_URL}/admin/delete-invest`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegramId: tId, investId: iId })
            });
            if(res.ok) loadData();
        }

        // Sayfa açıldığında verileri yükle
        window.onload = loadData;
    </script>
</body>
</html>
