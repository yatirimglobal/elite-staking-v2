<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Staking | Secure Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { background: #0f1113; color: #fff; font-family: 'Inter', sans-serif; }
        .admin-card { background: #1a1d21; border: 1px solid #2d3139; border-radius: 12px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold text-yellow-500 mb-8 uppercase tracking-tighter">Güvenli Yönetim Paneli</h1>
        
        <div id="loginArea" class="flex flex-col items-center justify-center mt-20">
            <p class="text-gray-400 mb-4 text-sm uppercase">Yönetici Şifresini Giriniz</p>
            <div class="flex gap-2">
                <input type="password" id="adminPass" class="bg-gray-800 border border-gray-700 p-3 rounded-xl outline-none focus:border-yellow-500 text-white w-64">
                <button onclick="login()" class="bg-yellow-500 text-black px-6 py-3 rounded-xl font-bold hover:bg-yellow-400 transition-all">GİRİŞ</button>
            </div>
        </div>

        <div id="adminContent" class="hidden space-y-6">
            <div class="flex justify-between items-center bg-yellow-500/10 p-4 rounded-xl border border-yellow-500/20 mb-6">
                <span class="text-yellow-500 font-bold text-xs">OTURUM AÇILDI</span>
                <button onclick="location.reload()" class="text-xs text-gray-500 underline uppercase">Çıkış Yap</button>
            </div>
            <div id="userList" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://elite-staking-v2.onrender.com/api';
        let savedPassword = "";

        async function login() {
            savedPassword = document.getElementById('adminPass').value;
            loadData();
        }

        async function loadData() {
            try {
                const res = await fetch(`${API_URL}/admin/all`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: savedPassword })
                });
                if(!res.ok) throw new Error("Hatalı Şifre!");
                
                const users = await res.json();
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                renderUsers(users);
            } catch (err) { alert(err.message); }
        }

        function renderUsers(users) {
            const list = document.getElementById('userList');
            list.innerHTML = users.length ? users.map(user => `
                <div class="admin-card p-6">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-3">
                        <div><h2 class="font-bold text-white">${user.name || 'Bilinmiyor'}</h2><p class="text-[10px] text-gray-500">ID: ${user.telegramId}</p></div>
                    </div>
                    ${user.investments.map(inv => `
                        <div class="flex flex-wrap items-center justify-between bg-black/40 p-3 rounded-lg mb-2">
                            <div class="text-[11px]">
                                <span class="text-gray-400">$${inv.amount.toFixed(2)}</span> | 
                                <span class="text-gray-400">${inv.planDays} GÜN</span> | 
                                <span class="${inv.status === 'Aktif' ? 'text-green-500' : 'text-yellow-500'} font-bold uppercase">${inv.status}</span>
                            </div>
                            <div class="flex gap-2">
                                ${inv.status === 'Onay Bekliyor' ? `<button onclick="approve('${user.telegramId}', '${inv._id}')" class="bg-green-600 text-white px-3 py-1 rounded text-[9px] font-bold uppercase">Onayla</button>` : ''}
                                <button onclick="del('${user.telegramId}', '${inv._id}')" class="bg-red-600/20 text-red-500 px-3 py-1 rounded text-[9px] font-bold uppercase">Sil</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('') : '<p class="text-center text-gray-600">Kayıt bulunamadı.</p>';
        }

        async function approve(tId, iId) {
            if(!confirm("Yatırımı onaylıyor musunuz?")) return;
            const res = await fetch(`${API_URL}/admin/approve`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: savedPassword, telegramId: tId, investId: iId }) });
            if(res.ok) loadData();
        }

        async function del(tId, iId) {
            if(!confirm("Bu işlemi silmek istediğinize emin misiniz?")) return;
            const res = await fetch(`${API_URL}/admin/delete-invest`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: savedPassword, telegramId: tId, investId: iId }) });
            if(res.ok) loadData();
        }
    </script>
</body>
</html>
