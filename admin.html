<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Elite Admin | Kontrol Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap');
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-2xl font-black text-yellow-500 font-orbitron uppercase italic">Yatırım Yönetimi</h1>
            <div class="flex gap-2">
                <input type="password" id="pass" placeholder="Admin Şifresi" class="bg-gray-800 border border-gray-700 px-4 py-2 rounded-lg focus:border-yellow-500 outline-none">
                <button onclick="fetchAdminData()" class="bg-yellow-500 text-black font-bold px-6 py-2 rounded-lg hover:bg-yellow-400">YÜKLE</button>
            </div>
        </div>

        <!-- Özet Sayaçları -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-5 border-l-4 border-blue-500">
                <p class="text-gray-400 text-xs font-bold">TOPLAM AKTİF ANAPARA</p>
                <h2 id="sumCapital" class="text-2xl font-black mt-1">$0.00</h2>
            </div>
            <div class="glass-card p-5 border-l-4 border-green-500">
                <p class="text-gray-400 text-xs font-bold">ÖDENECEK TOPLAM KÂR</p>
                <h2 id="sumProfit" class="text-2xl font-black mt-1 text-green-400">$0.00</h2>
            </div>
            <div class="glass-card p-5 border-l-4 border-yellow-500">
                <p class="text-gray-400 text-xs font-bold">TOPLAM ÖDEME YÜKÜ</p>
                <h2 id="sumTotal" class="text-2xl font-black mt-1 text-yellow-500">$0.00</h2>
            </div>
        </div>

        <!-- Tablo -->
        <div class="glass-card overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-[10px] uppercase text-gray-500 font-bold">
                    <tr>
                        <th class="p-4">Kullanıcı ID</th>
                        <th class="p-4">Vade</th>
                        <th class="p-4">Anapara</th>
                        <th class="p-4">Kâr</th>
                        <th class="p-4">Vade Sonu</th>
                        <th class="p-4">Durum</th>
                        <th class="p-4 text-right">Aksiyon</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-sm">
                    <!-- JS ile dolacak -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchAdminData() {
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/admin/all', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password })
            });

            if(res.status !== 200) return alert("Hatalı Şifre!");
            const users = await res.json();
            renderTable(users);
        }

        function renderTable(users) {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            let cap = 0, prof = 0;

            users.forEach(u => {
                u.investments.forEach(inv => {
                    if(inv.status === 'Aktif') {
                        cap += inv.amount;
                        prof += inv.totalProfit;
                    }
                    const total = inv.amount + inv.totalProfit;
                    body.innerHTML += `
                        <tr class="border-b border-white/5 hover:bg-white/[0.02]">
                            <td class="p-4 font-mono text-xs">${u.telegramId}</td>
                            <td class="p-4">${inv.planDays} GÜN</td>
                            <td class="p-4 font-bold">$${inv.amount.toFixed(2)}</td>
                            <td class="p-4 text-green-400">+$${inv.totalProfit.toFixed(2)}</td>
                            <td class="p-4 font-black text-yellow-500">$${total.toFixed(2)}</td>
                            <td class="p-4">
                                <span class="px-2 py-1 rounded text-[10px] font-bold ${inv.status === 'Aktif' ? 'bg-green-500/20 text-green-500' : 'bg-yellow-500/20 text-yellow-500'}">
                                    ${inv.status}
                                </span>
                            </td>
                            <td class="p-4 text-right">
                                ${inv.status === 'Onay Bekliyor' ? 
                                    `<button onclick="approve('${u.telegramId}', '${inv._id}')" class="bg-green-600 px-3 py-1 rounded text-[10px] font-bold">ONAYLA</button>` : 
                                    `<button onclick="deleteInv('${u.telegramId}', '${inv._id}')" class="bg-red-900/50 text-red-500 px-3 py-1 rounded text-[10px]">SİL</button>`
                                }
                            </td>
                        </tr>
                    `;
                });
            });

            document.getElementById('sumCapital').innerText = '$' + cap.toFixed(2);
            document.getElementById('sumProfit').innerText = '$' + prof.toFixed(2);
            document.getElementById('sumTotal').innerText = '$' + (cap + prof).toFixed(2);
        }

        async function approve(telegramId, investId) {
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/admin/approve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password, telegramId, investId })
            });
            if(res.ok) fetchAdminData();
        }

        async function deleteInv(telegramId, investId) {
            if(!confirm("Bu kaydı tamamen silmek istediğine emin misin?")) return;
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/admin/delete-invest', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password, telegramId, investId })
            });
            if(res.ok) fetchAdminData();
        }
    </script>
</body>
</html>
