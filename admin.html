<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Staking | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { background: #0f1113; color: #fff; font-family: 'Inter', sans-serif; }
        .admin-card { background: #1a1d21; border: 1px solid #2d3139; border-radius: 12px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-5xl mx-auto">
        <div id="loginArea" class="flex flex-col items-center justify-center mt-32">
            <h1 class="text-2xl font-bold text-yellow-500 mb-6 uppercase italic">Elite Admin Access</h1>
            <div class="flex gap-2 bg-[#1a1d21] p-2 rounded-2xl border border-gray-800">
                <input type="password" id="adminPass" placeholder="Şifre" class="bg-transparent p-3 outline-none text-white w-48">
                <button onclick="login()" class="bg-yellow-500 text-black px-6 py-3 rounded-xl font-bold text-xs">GİRİŞ</button>
            </div>
        </div>

        <div id="adminContent" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-bold text-yellow-500 uppercase italic">Yönetim Paneli</h1>
                <button onclick="loadData()" class="bg-yellow-500 text-black px-6 py-2 rounded-lg font-bold text-sm">🔄 YENİLE</button>
            </div>
            <div id="userList" class="space-y-6"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://elite-staking-v2.onrender.com/api';
        let savedPassword = "";

        async function login() { savedPassword = document.getElementById('adminPass').value; loadData(); }

        async function loadData() {
            try {
                const res = await fetch(`${API_URL}/admin/all`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: savedPassword }) });
                if(!res.ok) throw new Error("Şifre Yanlış!");
                const users = await res.json();
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                renderUsers(users);
            } catch (err) { alert(err.message); }
        }

        function renderUsers(users) {
            const list = document.getElementById('userList');
            list.innerHTML = users.map(user => `
                <div class="admin-card p-6">
                    <div class="flex justify-between items-center border-b border-gray-800 pb-4 mb-4">
                        <div><h2 class="font-bold text-lg text-white">${user.name || 'Bilinmiyor'}</h2><p class="text-xs text-gray-500 italic">ID: ${user.telegramId}</p></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <h3 class="text-yellow-500 text-[10px] font-bold uppercase mb-3">Aktif İşlemler</h3>
                            ${user.investments.map(inv => `
                                <div class="bg-black/30 p-3 rounded mb-2 flex justify-between items-center border border-white/5">
                                    <span class="text-xs">$${inv.amount.toFixed(2)} - ${inv.status}</span>
                                    <div class="flex gap-2">
                                        ${inv.status === 'Onay Bekliyor' ? `<button onclick="action('approve', '${user.telegramId}', '${inv._id}')" class="bg-green-600 text-white px-3 py-1 rounded text-[9px] font-bold">ONAYLA</button>` : ''}
                                        <button onclick="action('delete-invest', '${user.telegramId}', '${inv._id}')" class="bg-red-600/20 text-red-500 px-3 py-1 rounded text-[9px] font-bold">SİL</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div>
                            <h3 class="text-red-400 text-[10px] font-bold uppercase mb-3">Çekim Talepleri</h3>
                            ${user.withdrawals && user.withdrawals.length > 0 ? user.withdrawals.map(w => `
                                <div class="bg-red-500/5 border border-red-500/10 p-3 rounded text-[11px] mb-2">
                                    <p class="font-bold text-white">Miktar: $${w.amount.toFixed(2)}</p>
                                    <p class="text-yellow-500 select-all mt-1 font-mono">${w.wallet}</p>
                                    <p class="text-[9px] text-gray-500 mt-1">${new Date(w.date).toLocaleString()}</p>
                                </div>
                            `).join('') : '<p class="text-[10px] text-gray-600 italic">Talep yok.</p>'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function action(type, tId, iId) {
            if(!confirm("Emin misiniz?")) return;
            const res = await fetch(`${API_URL}/admin/${type}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: savedPassword, telegramId: tId, investId: iId }) });
            if(res.ok) loadData();
        }
    </script>
</body>
</html>
