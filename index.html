<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Elite Staking - Yatırım Paneli</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; max-width: 400px; margin: 20px auto; border: 1px solid #334155; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 95%; }
        button:hover { background: #7dd3fc; }
    </style>
</head>
<body>
    <h1>🚀 Elite Staking V2</h1>
    <p>Geleceğinize bugün yatırım yapın.</p>

    <div class="card">
        <h3>Yatırım Yap</h3>
        <input type="text" id="userName" placeholder="Adınız Soyadınız">
        <input type="number" id="amount" placeholder="Yatırım Tutarı ($)">
        <select id="plan">
            <option value="7">7 Günlük Plan (%10 Kâr)</option>
            <option value="30">30 Günlük Plan (%50 Kâr)</option>
        </select>
        <button onclick="sendInvest()">Yatırımı Başlat</button>
    </div>

    <script>
        async function sendInvest() {
            const data = {
                telegramId: "123456", // Bu normalde bottan otomatik gelmeli
                name: document.getElementById('userName').value,
                amount: document.getElementById('amount').value,
                planDays: document.getElementById('plan').value
            };

            const response = await fetch('/api/invest', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert("Yatırım talebiniz başarıyla gönderildi! Onay bekleniyor.");
            } else {
                alert("Bir hata oluştu.");
            }
        }
    </script>
</body>
</html>
