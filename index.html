<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Crypto Staking</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600;800&display=swap');
        body { background: #080a0c; color: #eaeaeb; font-family: 'Inter', sans-serif; margin: 0; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { color: #f3ba2f !important; }
    </style>
</head>
<body class="pb-32">

    <div class="p-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div id="uAvatar" class="w-10 h-10 bg-yellow-500 rounded-xl flex items-center justify-center font-black text-black text-lg font-orbitron">?</div>
            <div>
                <h1 id="uName" class="font-bold text-sm tracking-tight uppercase leading-none">Yükleniyor...</h1>
                <span class="text-[9px] text-gray-500 uppercase tracking-widest">Elite Member</span>
            </div>
        </div>
    </div>

    <div class="px-6">
        <div id="tab-home" class="tab-content active">
            <h2 class="font-orbitron text-lg font-black mb-6 text-yellow-500 uppercase tracking-tighter italic">Staking Planları</h2>
            <div class="space-y-4">
                <div class="glass-card p-6 border-l-4 border-yellow-500">
                    <div class="flex justify-between items-start mb-4">
                        <div><h3 class="font-bold text-white uppercase text-sm">10 GÜN VADE</h3><p class="text-[10px] text-gray-500 mt-1">Anlık Kazanç Yansıma</p></div>
                        <span class="text-green-400 font-orbitron text-lg font-bold">%8</span>
                    </div>
                    <button onclick="openInvestModal(10, 8)" class="w-full bg-yellow-500 text-black font-black py-3 rounded-xl text-[10px] uppercase shadow-lg active:scale-95 transition-all">PLANI SEÇ</button>
                </div>
                <div class="glass-card p-6 border-l-4 border-blue-500">
                    <div class="flex justify-between items-start mb-4">
                        <div><h3 class="font-bold text-white uppercase text-sm">30 GÜN VADE</h3><p class="text-[10px] text-gray-500 mt-1">Maksimum Getiri</p></div>
                        <span class="text-green-400 font-orbitron text-lg font-bold">%22</span>
                    </div>
                    <button onclick="openInvestModal(30, 22)" class="w-full bg-blue-600 text-white font-black py-3 rounded-xl text-[10px] uppercase shadow-lg active:scale-95 transition-all">PLANI SEÇ</button>
                </div>
            </div>
        </div>

        <div id="tab-investments" class="tab-content">
            <h2 class="font-orbitron text-lg font-black mb-6 text-blue-500 uppercase tracking-tighter italic">Varlıklarım</h2>
            <div id="myInvestmentsList" class="space-y-4">
                <p class="text-center text-gray-600 mt-10 text-xs italic">Henüz yatırımınız bulunmuyor.</p>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-black/80 backdrop-blur-2xl border border-white/10 rounded-3xl flex justify-around py-4 z-50">
        <button onclick="switchTab('home')" id="navHome" class="nav-active flex flex-col items-center gap-1">
            <span class="text-xl">💎</span><span class="text-[9px] font-black uppercase">Kazan</span>
        </button>
        <button onclick="switchTab('investments')" id="navInvest" class="text-gray-500 flex flex-col items-center gap-1">
            <span class="text-xl">📊</span><span class="text-[9px] font-black uppercase">Varlıklar</span>
        </button>
    </nav>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-6 z-[100] backdrop-blur-xl">
        <div class="glass-card w-full max-w-sm p-8 border-yellow-500/20">
            <div id="step1">
                <h3 class="font-orbitron text-center text-md font-black text-white mb-6 uppercase">YATIRIM TUTARI</h3>
                <input type="number" id="investAmount" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-center text-xl font-bold text-yellow-500 mb-6 focus:outline-none" placeholder="0.00 USDT">
                <button onclick="toStep2()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl text-xs uppercase">DEVAM ET</button>
            </div>
            <div id="step2" class="hidden text-center">
                <h3 class="font-orbitron text-sm font-black text-white mb-4 uppercase">TRC20 ÖDEME ADRESİ</h3>
                <div class="bg-black p-4 rounded-xl border border-dashed border-yellow-500/50 mb-6 select-all">
                    <p id="walletAddr" class="font-mono text-[9px] text-yellow-500 break-all">TY7xP_GERCEK_TRC20_ADRESIN_BURAYA</p>
                </div>
                <button id="confirmBtn" onclick="confirmPay()" class="w-full bg-green-600 text-white font-black py-4 rounded-xl text-xs uppercase">ÖDEMEYİ TAMAMLADIM</button>
            </div>
            <button onclick="closeModal()" class="w-full mt-4 text-gray-500 text-[10px] font-bold uppercase tracking-widest">İPTAL</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const API_URL = 'https://elite-staking-v2.onrender.com/api';
        let currentPlan = null;
        let userData = null;

        window.onload = () => {
            tg.ready(); tg.expand();
            const user = tg.initDataUnsafe?.user || { id: "12345", first_name: "TestUser" };
            document.getElementById('uName').innerText = user.first_name.toUpperCase();
            document.getElementById('uAvatar').innerText = user.first_name.charAt(0).toUpperCase();
            syncUser(user);
            setInterval(updateUIRuntime, 1000); // Saniyelik canlı güncelleme
        };

        async function syncUser(user) {
            try {
                const res = await fetch(`${API_URL}/sync`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegramId: user.id.toString(), name: user.first_name })
                });
                userData = await res.json();
                renderInvestments();
            } catch(e) { console.error(e); }
        }

        function openInvestModal(days, profitRate) {
            currentPlan = { days, profitRate, min: 10 };
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('modal').classList.replace('hidden', 'flex');
        }

        function toStep2() {
            const val = document.getElementById('investAmount').value;
            if(!val || val < 10) return alert("Minimum yatırım 10 USDT'dir.");
            currentPlan.amount = Number(val);
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        async function confirmPay() {
            const btn = document.getElementById('confirmBtn');
            btn.disabled = true; btn.innerText = "BİLDİRİLİYOR...";
            try {
                const res = await fetch(`${API_URL}/invest`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegramId: userData.telegramId,
                        planDays: currentPlan.days,
                        amount: currentPlan.amount,
                        profit: currentPlan.amount * (currentPlan.profitRate / 100)
                    })
                });
                if(res.ok) { alert("Yatırım bildirildi! Onay bekleniyor."); closeModal(); syncUser(userData); }
            } catch(e) { alert("Hata oluştu."); }
            finally { btn.disabled = false; btn.innerText = "ÖDEMEYİ TAMAMLADIM"; }
        }

        function renderInvestments() {
            const list = document.getElementById('myInvestmentsList');
            if(!userData.investments.length) return;

            list.innerHTML = userData.investments.map(inv => {
                let statusColor = inv.status === 'Aktif' ? 'text-green-400' : 'text-yellow-500';
                if(inv.status === 'Iptal Edildi') statusColor = 'text-red-500';

                return `
                    <div class="glass-card p-5 border-l-2 border-white/10" id="inv-${inv._id}">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] font-black text-gray-500 uppercase">${inv.planDays} GÜN PLAN</span>
                            <span class="text-[9px] px-2 py-1 rounded bg-white/5 ${statusColor} font-bold uppercase">${inv.status}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div><p class="text-[9px] text-gray-500 uppercase">Sermaye</p><p class="text-sm font-bold">$${inv.amount}</p></div>
                            <div><p class="text-[9px] text-gray-500 uppercase">Canlı Kazanç</p><p class="text-sm font-bold text-green-400 font-orbitron" id="profit-${inv._id}">$0.00</p></div>
                        </div>
                        <div class="mb-4">
                            <p class="text-[9px] text-gray-500 uppercase mb-1">Kalan Süre</p>
                            <p class="text-xs font-mono text-white" id="timer-${inv._id}">--:--:--</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="cancelInvest('${inv._id}')" class="flex-1 bg-red-500/10 border border-red-500/20 text-red-500 py-2 rounded-lg text-[9px] font-black uppercase ${inv.status !== 'Aktif' && inv.status !== 'Onay Bekliyor' ? 'hidden' : ''}">Yatırımı İptal Et</button>
                            <button id="withdraw-${inv._id}" disabled class="flex-1 bg-green-500/10 border border-green-500/20 text-gray-600 py-2 rounded-lg text-[9px] font-black uppercase">Para Çek</button>
                        </div>
                    </div>
                `;
            }).reverse().join('');
        }

        function updateUIRuntime() {
            if(!userData || !userData.investments) return;
            userData.investments.forEach(inv => {
                if(inv.status !== 'Aktif') return;

                const startTime = new Date(inv.createdAt).getTime();
                const duration = inv.planDays * 24 * 60 * 60 * 1000;
                const endTime = startTime + duration;
                const now = new Date().getTime();
                const diff = endTime - now;

                // 1. Geri Sayım Sayacı
                const timerEl = document.getElementById(`timer-${inv._id}`);
                if(diff > 0) {
                    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((diff % (1000 * 60)) / 1000);
                    if(timerEl) timerEl.innerText = `${d}g ${h}s ${m}d ${s}s`;
                    
                    // 2. Canlı Kazanç Artışı (Sermaye + (Kar * Geçen Yüzde))
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const currentProfit = (inv.totalProfit * progress).toFixed(4);
                    const profitEl = document.getElementById(`profit-${inv._id}`);
                    if(profitEl) profitEl.innerText = `$${currentProfit}`;
                } else {
                    if(timerEl) timerEl.innerText = "SÜRE DOLDU";
                    const profitEl = document.getElementById(`profit-${inv._id}`);
                    if(profitEl) profitEl.innerText = `$${inv.totalProfit.toFixed(2)}`;
                    
                    // Para çekme butonunu aktif et
                    const drawBtn = document.getElementById(`withdraw-${inv._id}`);
                    if(drawBtn) {
                        drawBtn.disabled = false;
                        drawBtn.classList.replace('text-gray-600', 'text-green-500');
                        drawBtn.innerText = "PARA ÇEK";
                    }
                }
            });
        }

        async function cancelInvest(id) {
            if(!confirm("Yatırımı iptal etmek istediğinize emin misiniz?")) return;
            try {
                const res = await fetch(`${API_URL}/cancel-invest`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegramId: userData.telegramId, investId: id })
                });
                if(res.ok) { alert("İptal edildi."); syncUser(userData); }
            } catch(e) { alert("Hata oluştu."); }
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('navHome').className = t === 'home' ? 'nav-active flex flex-col items-center gap-1' : 'text-gray-500 flex flex-col items-center gap-1';
            document.getElementById('navInvest').className = t === 'investments' ? 'nav-active flex flex-col items-center gap-1' : 'text-gray-500 flex flex-col items-center gap-1';
        }
        function closeModal() { document.getElementById('modal').classList.replace('flex', 'hidden'); }
    </script>
</body>
</html>
